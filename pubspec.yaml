name: modern_networking
description: "Gym Equipment Manager - modern networking with Dio."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking (core of the project)
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # Local persistence (custom exercises + theme)
  shared_preferences: ^2.3.2

  # Remote image / GIF loading with caching
  cached_network_image: ^3.4.1

  # Picking images from the device gallery
  image_picker: ^1.1.2

  # Loading placeholders
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider_android: 2.2.12
